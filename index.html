<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRML · MRO Prediction System</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #080c14;
        }

        /* ল্যাপটপ বা বড় স্ক্রিনের জন্য (Full Screen) */
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }

        
        @media only screen and (max-width: 768px) {
            body, html {
                overflow: auto; 
            }
            iframe {
                width: 1280px; 
                height: 100vh;
               
                transform: scale(0.32); 
                transform-origin: 0 0;
                width: 312.5%; /* scale 0.32 হলে width (100 / 0.32) = 312.5% হতে হয় */
            }
        }
    </style>
</head>
<body>
    <iframe 
        src="https://script.google.com/macros/s/AKfycby3QTice-XPp1SslToWVunpV90fKv3NP2sVwMlh7MDCXNf-Y0F_fqBigmjOgiVj1lH0Xg/exec"
        allow="fullscreen">
    </iframe>
</body>
</html>
