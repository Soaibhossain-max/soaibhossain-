<!DOCTYPE html>
<html>
<head>
    <title>My Apps Script Integration</title>
</head>
<body>
    <h1>Apps Script Data Handler</h1>
    <button onclick="runScript()">Run Script</button>

    <script>
        function runScript() {
            // আপনার কপি করা URL-টি এখানে বসান
            const scriptURL = "https://script.google.com/a/macros/akijagrofeed.com/s/AKfycby3QTice-XPp1SslToWVunpV90fKv3NP2sVwMlh7MDCXNf-Y0F_fqBigmjOgiVj1lH0Xg/exec";

            fetch(scriptURL)
                .then(response => {
                    alert("Script Triggered Successfully!");
                })
                .catch(error => {
                    console.error('Error!', error.message);
                });
        }
    </script>
</body>
</html>
